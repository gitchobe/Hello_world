<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>분노의 양치질! (Chomp Chomp Clean)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&display=swap');
        .font-main { font-family: 'Do Hyeon', sans-serif; }
        .font-title { font-family: 'Black Han Sans', sans-serif; }
        
        /* 거품 애니메이션 */
        @keyframes foam-up {
            0% { transform: scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: scale(1.3) translateY(-30px); opacity: 0; }
        }
        .foam {
            position: absolute;
            pointer-events: none;
            animation: foam-up 0.6s ease-out forwards;
        }
        
        /* 진동 효과 */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(3px, -2px); }
            60% { transform: translate(-3px, -3px); }
            80% { transform: translate(3px, 3px); }
        }
        .shake-active { animation: shake 0.15s infinite; }
        
        /* 피버 타임 번쩍임 */
        @keyframes flash {
            0%, 100% { background-color: #38bdf8; }
            50% { background-color: #bae6fd; }
        }
        .fever-bg { animation: flash 0.3s infinite; }
    </style>
</head>
<body class="bg-slate-900 font-main min-h-screen flex flex-col justify-center items-center p-4 select-none touch-none">

    <div id="game-card" class="w-full max-w-md bg-slate-800 border-4 border-slate-700 rounded-3xl shadow-2xl overflow-hidden flex flex-col relative">
        
        <div id="start-screen" class="absolute inset-0 bg-slate-900/95 z-30 flex flex-col justify-center items-center p-6 text-center">
            <h1 class="text-4xl font-title text-sky-400 mb-2 tracking-wide drop-shadow">분노의 양치질!!</h1>
            <p class="text-slate-400 text-sm mb-6 font-mono">20초 안에 세균을 문질러 박멸하세요!</p>
            <div class="text-6xl mb-6 animate-bounce">🪥✨</div>
            <button onclick="startGame()" class="w-full bg-sky-500 hover:bg-sky-400 text-white font-title text-2xl py-4 px-6 rounded-2xl shadow-lg border-b-4 border-sky-700 active:border-b-0 active:mt-1 transition-all">
                치카치카 시작하기
            </button>
        </div>

        <div id="game-over-screen" class="absolute inset-0 bg-slate-900/95 z-30 flex flex-col justify-center items-center p-6 text-center hidden">
            <h2 class="text-3xl font-title text-emerald-400 mb-2">✨ 양치 완료! ✨</h2>
            <div class="bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 my-4 w-full">
                <p class="text-slate-400 text-sm">최종 스코어</p>
                <p id="final-score" class="text-5xl font-title text-yellow-400 mt-1">0</p>
                <p id="final-grade" class="text-lg text-sky-300 mt-2 font-bold"></p>
            </div>
            <button onclick="startGame()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-title text-xl py-3 px-6 rounded-2xl shadow-lg border-b-4 border-emerald-700 active:border-b-0 active:mt-1 transition-all">
                다시 닦기 (재도전)
            </button>
        </div>

        <div class="p-4 bg-slate-800 border-b border-slate-700 grid grid-cols-3 gap-2 text-center text-white">
            <div class="bg-slate-900/50 rounded-xl p-2 border border-slate-700/50">
                <span class="block text-xs text-slate-400">남은 시간</span>
                <span id="timer" class="text-2xl font-title text-red-400">20</span>
            </div>
            <div class="bg-slate-900/50 rounded-xl p-2 border border-slate-700/50">
                <span class="block text-xs text-slate-400">청결도 점수</span>
                <span id="score" class="text-2xl font-title text-yellow-400">0</span>
            </div>
            <div class="bg-slate-900/50 rounded-xl p-2 border border-slate-700/50">
                <span class="block text-xs text-slate-400">연속 콤보</span>
                <span id="combo" class="text-2xl font-title text-indigo-400">0</span>
            </div>
        </div>

        <div class="w-full bg-slate-950 h-3 overflow-hidden relative">
            <div id="fever-bar" class="h-full bg-gradient-to-r from-sky-400 to-indigo-500 w-0 transition-all duration-75"></div>
            <div id="fever-text" class="absolute inset-0 flex justify-center items-center text-[9px] text-white font-bold opacity-0">FEVER READY!</div>
        </div>

        <div id="brush-zone" class="relative bg-slate-950 h-80 flex flex-col justify-center items-center overflow-hidden cursor-crosshair">
            
            <div id="mouth-frame" class="w-72 h-40 border-4 border-rose-900/40 rounded-full flex flex-col justify-between p-1 opacity-60">
                <div class="flex justify-center gap-1">
                    <div class="w-7 h-6 bg-slate-800 rounded-b"></div>
                    <div class="w-7 h-6 bg-slate-800 rounded-b"></div>
                    <div class="w-8 h-7 bg-slate-800 rounded-b"></div>
                    <div class="w-8 h-7 bg-slate-800 rounded-b"></div>
                    <div class="w-7 h-6 bg-slate-800 rounded-b"></div>
                    <div class="w-7 h-6 bg-slate-800 rounded-b"></div>
                </div>
                <div class="flex justify-center gap-1">
                    <div class="w-7 h-6 bg-slate-800 rounded-t"></div>
                    <div class="w-7 h-6 bg-slate-800 rounded-t"></div>
                    <div class="w-8 h-7 bg-slate-800 rounded-t"></div>
                    <div class="w-8 h-7 bg-slate-800 rounded-t"></div>
                    <div class="w-7 h-6 bg-slate-800 rounded-t"></div>
                    <div class="w-7 h-6 bg-slate-800 rounded-t"></div>
                </div>
            </div>

            <div id="elements-container" class="absolute inset-0"></div>

            <div id="action-hint" class="absolute text-slate-500 text-sm font-bold animate-pulse text-center pointer-events-none">
                여기 마우스를 누른 채 비비거나<br>화면을 문지르세요! 🦷
            </div>
        </div>

        <div id="status-footer" class="bg-slate-800 p-3 text-center text-xs text-slate-400 border-t border-slate-700">
            치카치카 마찰음 가상 이펙트 활성화 중 🫧
        </div>

    </div>

    <script>
        let score = 0;
        let combo = 0;
        let timeLeft = 20;
        let feverGauge = 0;
        let isFever = false;
        let gameActive = false;
        let gameTimer = null;
        let germSpawner = null;
        let comboTimeout = null;
        let isMousedown = false;

        const brushZone = document.getElementById('brush-zone');
        const elementsContainer = document.getElementById('elements-container');
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const timerEl = document.getElementById('timer');
        const feverBar = document.getElementById('fever-bar');
        const feverText = document.getElementById('fever-text');

        // 세균 이모지 목록
        const germEmojis = ['🦠', '👾', '😈', '🪱'];

        // 게임 시작
        function startGame() {
            score = 0;
            combo = 0;
            timeLeft = 20;
            feverGauge = 0;
            isFever = false;
            gameActive = true;
            elementsContainer.innerHTML = '';
            
            scoreEl.innerText = score;
            comboEl.innerText = combo;
            timerEl.innerText = timeLeft;
            feverBar.style.width = '0%';
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('status-footer').innerText = "⚡ 폭풍 양치질 개시!! ⚡";

            // 타이머 구동
            gameTimer = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) endPositions();
            }, 1000);

            // 세균 주기적 생성
            spawnGerms(8); // 처음 기본 세균 배치
            germSpawner = setInterval(() => {
                if(elementsContainer.querySelectorAll('.germ').length < 12) {
                    spawnGerms(2);
                }
            }, 800);
        }

        // 세균 배치 함수
        function spawnGerms(count) {
            for (let i = 0; i < count; i++) {
                const germ = document.createElement('div');
                germ.className = 'germ absolute text-3xl select-none transition-transform duration-100 hover:scale-110 p-2 cursor-crosshair';
                germ.innerText = germEmojis[Math.floor(Math.random() * germEmojis.length)];
                
                // 마우스 진입 혹은 터치 드래그 스치기만 해도 피격 판정 (중독성의 핵심)
                germ.addEventListener('mouseenter', () => { if(isMousedown || isFever) hitGerm(germ); });
                germ.addEventListener('touchmove', () => { hitGerm(germ); }); 
                germ.addEventListener('mousedown', () => { hitGerm(germ); });

                // 위치 무작위 배정
                const x = Math.random() * (brushZone.clientWidth - 40);
                const y = Math.random() * (brushZone.clientHeight - 40);
                germ.style.left = `${x}px`;
                germ.style.top = `${y}px`;

                elementsContainer.appendChild(germ);
            }
        }

        // 세균 처치 공정
        function hitGerm(germ) {
            if (!gameActive || germ.classList.contains('dying')) return;
            germ.classList.add('dying');

            // 콤보 시스템
            combo++;
            comboEl.innerText = combo;
            clearTimeout(comboTimeout);
            comboTimeout = setTimeout(() => { combo = 0; comboEl.innerText = combo; }, 1500);

            // 점수 가산 (피버 타임엔 2배)
            const addedScore = isFever ? 20 : 10;
            score += addedScore;
            scoreEl.innerText = score;

            // 시각 효과 (거품 생성)
            createFoam(parseFloat(germ.style.left), parseFloat(germ.style.top));

            // 타격 진동 애니메이션 추가
            brushZone.classList.add('shake-active');
            setTimeout(() => brushZone.classList.remove('shake-active'), 100);

            // 피버 게이지 충전
            if (!isFever) {
                feverGauge = Math.min(100, feverGauge + 4 + (combo * 0.2));
                feverBar.style.width = `${feverGauge}%`;
                if (feverGauge >= 100) triggerFever();
            }

            // 원소 삭제 후 새로운 개체 리스폰
            germ.remove();
            spawnGerms(1);
        }

        // 거품 공장 효과
        function createFoam(x, y) {
            const foam = document.createElement('div');
            foam.className = 'foam text-2xl';
            foam.innerText = Math.random() > 0.4 ? '🫧' : '🧼';
            foam.style.left = `${x + 10}px`;
            foam.style.top = `${y}px`;
            elementsContainer.appendChild(foam);
            setTimeout(() => foam.remove(), 600);
        }

        // 피버 타임 시스템
        function triggerFever() {
            isFever = true;
            feverText.className = "absolute inset-0 flex justify-center items-center text-[11px] text-white font-title opacity-100 animate-ping";
            feverText.innerText = "🔥 가글 폭발 피버 타임!! 🔥";
            brushZone.classList.add('fever-bg');
            document.getElementById('status-footer').innerText = "🌊 마우스만 올려도 자동 소독되는 가글 타임!! 🌊";

            let feverTimer = setInterval(() => {
                feverGauge -= 5;
                feverBar.style.width = `${feverGauge}%`;
                if (feverGauge <= 0) {
                    clearInterval(feverTimer);
                    isFever = false;
                    feverText.className = "absolute inset-0 flex justify-center items-center text-[9px] text-white font-bold opacity-0";
                    brushZone.classList.remove('fever-bg');
                    document.getElementById('status-footer').innerText = "치카치카 마찰음 가상 이펙트 활성화 중 🫧";
                }
            }, 150);
        }

        // 드래그 상태 감지 모듈
        window.addEventListener('mousedown', () => isMousedown = true);
        window.addEventListener('mouseup', () => isMousedown = false);
        
        // 모바일 터치 드래그를 위한 최적화 인터랙션
        brushZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = brushZone.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            const germs = document.querySelectorAll('.germ');
            germs.forEach(germ => {
                const gx = parseFloat(germ.style.left);
                const gy = parseFloat(germ.style.top);
                // 터치 좌표와 세균 간의 거리 측정 (반경 내 도달 시 충돌 판정)
                if (Math.abs(gx - x) < 35 && Math.abs(gy - y) < 35) {
                    hitGerm(germ);
                }
            });
        }, { passive: false });

        // 게임 종료 및 정산
        function endPositions() {
            gameActive = false;
            clearInterval(gameTimer);
            clearInterval(germSpawner);
            clearTimeout(comboTimeout);
            
            document.getElementById('final-score').innerText = score;
            
            // 등급 책정
            let grade = "건치 영웅 등급 🦷";
            if(score < 200) grade = "충치 위험군 등급 👿";
            else if(score < 500) grade = "평범한 청결인 등급 🧼";
            else if(score >= 800) grade = "은하계 덴탈 마스터 등급 👑";
            
            document.getElementById('final-grade').innerText = grade;
            document.getElementById('game-over-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
